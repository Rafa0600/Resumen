<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Despachos - Mikra + Chaya</title>
    <meta name="theme-color" content="#080810">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Despachos">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080810;
            --surface: #0f0f1a;
            --border: #1c1c2e;
            --border-bright: #2a2a40;
            --text: #e0e0f0;
            --muted: #555570;
            --yellow: #FFE600;
            --green: #00e676;
            --blue: #40c4ff;
            --red: #ff4444;
            --purple: #d070ff;
            --orange: #ffaa44;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 0 40px;
            /* Subtle grid bg */
            background-image: 
                linear-gradient(rgba(255,230,0,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,230,0,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── HEADER ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8,8,16,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-title {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .header-title span { color: var(--yellow); }
        .header-time {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        /* ── HERO ── */
        .hero {
            text-align: center;
            padding: 28px 20px 20px;
            display: none;
        }
        .hero-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .hero-number {
            font-family: 'Space Mono', monospace;
            font-size: 72px;
            font-weight: 700;
            color: var(--yellow);
            line-height: 1;
            text-shadow: 0 0 40px rgba(255,230,0,0.3);
        }
        .hero-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 6px;
        }
        .hero-cached-badge {
            display: inline-block;
            margin-top: 8px;
            background: rgba(255,230,0,0.08);
            border: 1px solid rgba(255,230,0,0.2);
            color: rgba(255,230,0,0.6);
            border-radius: 20px;
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            padding: 3px 10px;
        }

        /* ── REFRESH BTN ── */
        .refresh-wrap {
            padding: 0 20px 16px;
        }
        .reload-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-bright);
            color: var(--muted);
            padding: 12px;
            border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .reload-btn:hover, .reload-btn:active { border-color: var(--yellow); color: var(--yellow); }
        .reload-btn:disabled { opacity: 0.35; cursor: wait; }

        /* ── CARDS ── */
        .content { padding: 0 16px; }

        .cuenta-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px 16px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
        }
        .cuenta-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }
        .cuenta-card.mikra::before { background: linear-gradient(90deg, #9C27B0, #d070ff); }
        .cuenta-card.chaya::before { background: linear-gradient(90deg, #FF6B00, #ffaa44); }
        .cuenta-card.total { background: linear-gradient(135deg, var(--surface), #0f0f20); border-color: rgba(255,230,0,0.15); }
        .cuenta-card.total::before { background: linear-gradient(90deg, #b8a000, var(--yellow)); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 14px;
        }
        .card-name {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .mikra .card-name { color: var(--purple); }
        .chaya .card-name { color: var(--orange); }
        .total .card-name { color: var(--yellow); }

        .card-imprimir {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--muted);
        }
        .card-imprimir b { color: var(--red); }

        /* ── STAT GRID ── */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 12px;
            text-align: center;
        }
        .stat-num {
            font-family: 'Space Mono', monospace;
            font-size: 36px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px;
        }
        .stat-lbl {
            font-size: 11px;
            color: var(--muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-sub {
            font-size: 10px;
            color: #383850;
            font-family: 'Space Mono', monospace;
            margin-top: 2px;
        }

        .stat-box.flex .stat-num { color: var(--green); }
        .stat-box.colecta .stat-num { color: var(--blue); }

        /* ── BUFFERED ── */
        .buffered-row {
            margin-top: 8px;
            text-align: center;
            font-size: 11px;
            color: #444458;
            font-family: 'Space Mono', monospace;
            padding: 6px;
            border-top: 1px solid var(--border);
        }

        /* ── ERROR STATE ── */
        .error-badge {
            display: inline-block;
            background: rgba(255,68,68,0.1);
            border: 1px solid rgba(255,68,68,0.25);
            color: #ff7070;
            border-radius: 8px;
            font-size: 11px;
            padding: 4px 10px;
            margin-top: 8px;
        }

        /* ── LOADING ── */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #1c1c2e;
            border-top-color: var(--yellow);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-text {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: #333346;
            margin-top: 8px;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeUp 0.35s ease forwards; }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 transparent; }
            50% { box-shadow: 0 0 16px 2px rgba(255,68,68,0.15); }
        }
        .has-prints { animation: pulse-red 2.5s ease infinite; }

        /* ── STATUS DOT ── */
        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 16px 20px 0;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted);
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
        .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .dot.cached { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
        .dot.error { background: var(--red); }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">📦 <span>Despachos</span></div>
        <div class="header-time" id="headerTime">—</div>
    </div>

    <div class="hero" id="hero">
        <div class="hero-label">Para imprimir</div>
        <div class="hero-number" id="heroNumber">0</div>
        <div class="hero-sub" id="heroSub">paquetes</div>
        <div id="heroCachedBadge" style="display:none" class="hero-cached-badge">⚡ datos en caché</div>
    </div>

    <div class="refresh-wrap">
        <button class="reload-btn" id="reloadBtn" onclick="cargarTodo(false)">
            <span id="reloadIcon">⟳</span> Actualizar
        </button>
    </div>

    <div class="content" id="content">
        <div class="loading-state">
            <div class="spinner"></div>
            Cargando paquetes...
            <div class="progress-text" id="progress"></div>
        </div>
    </div>

    <div class="status-row" id="statusRow" style="display:none">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">—</span>
    </div>

    <script>
    // ══════════════════════════════════════════════
    //  CONFIG
    // ══════════════════════════════════════════════
    const CUENTAS = [
        {
            nombre: 'Mikra',
            proxy: 'https://mikra-flex-proxy.rafaelassir.workers.dev',
            css: 'mikra',
            colectaLabel: 'Recolecta',
            colectaDesc: 'ML pasa a buscar'
        },
        {
            nombre: 'Chaya',
            proxy: 'https://chaya-flex-proxy.rafaelassir.workers.dev',
            css: 'chaya',
            colectaLabel: 'Despacho',
            colectaDesc: 'Llevar a punto'
        }
    ];

    const TOKEN_TTL_MS   = 55 * 60 * 1000;   // 55 min (tokens duran ~6h, renovamos cada 55 min)
    const RESULTS_TTL_MS =  3 * 60 * 1000;   // 3 min de caché de resultados
    const FETCH_TIMEOUT  = 12_000;            // 12 seg timeout por request
    const MAX_RETRIES    = 3;
    const RETRY_DELAY_MS = 600;

    // ── Caché en memoria ──
    const tokenCache = {};       // { proxy -> { token, userId, expiresAt } }
    let   resultadosCache = null; // { data, fetchedAt }

    // ══════════════════════════════════════════════
    //  HELPERS
    // ══════════════════════════════════════════════

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function fetchConTimeout(url, opts = {}, timeout = FETCH_TIMEOUT) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), timeout);
        try {
            const resp = await fetch(url, { ...opts, signal: ctrl.signal });
            return resp;
        } finally {
            clearTimeout(timer);
        }
    }

    /** Fetch con reintentos + backoff exponencial */
    async function fetchConRetry(url, opts = {}, retries = MAX_RETRIES) {
        for (let i = 0; i <= retries; i++) {
            try {
                const resp = await fetchConTimeout(url, opts);
                if (resp.ok) return resp;
                // 429 Rate limit: esperar más
                if (resp.status === 429) {
                    await sleep(RETRY_DELAY_MS * (i + 1) * 2);
                    continue;
                }
                // 4xx (salvo 429): no reintentar
                if (resp.status >= 400 && resp.status < 500) throw new Error(`HTTP ${resp.status}`);
                // 5xx: reintentar
                if (i < retries) await sleep(RETRY_DELAY_MS * (i + 1));
            } catch (e) {
                if (i === retries) throw e;
                await sleep(RETRY_DELAY_MS * (i + 1));
            }
        }
        throw new Error(`Falló tras ${retries} reintentos`);
    }

    async function jsonConRetry(url, opts = {}) {
        const resp = await fetchConRetry(url, opts);
        return resp.json();
    }

    // ══════════════════════════════════════════════
    //  TOKEN (con caché)
    // ══════════════════════════════════════════════

    async function getToken(cuenta) {
        const cached = tokenCache[cuenta.proxy];
        if (cached && Date.now() < cached.expiresAt) {
            return { access_token: cached.token, user_id: cached.userId };
        }
        // Fetch fresco
        const data = await jsonConRetry(`${cuenta.proxy}/get-token`);
        tokenCache[cuenta.proxy] = {
            token:     data.access_token,
            userId:    data.user_id,
            expiresAt: Date.now() + TOKEN_TTL_MS
        };
        return data;
    }

    /** Invalidar token (si un request da 401) */
    function invalidarToken(proxy) {
        delete tokenCache[proxy];
    }

    // ══════════════════════════════════════════════
    //  CARGA POR CUENTA
    // ══════════════════════════════════════════════

    async function cargarCuenta(cuenta) {
        let { access_token, user_id } = await getToken(cuenta);
        const makeAuthOpts = () => ({ headers: { 'Authorization': `Bearer ${access_token}` } });

        // Fetch todas las páginas de un substatus dado, devuelve ship IDs
        async function fetchSubstatus(substatus) {
            const shipIds = [];
            let offset = 0;
            while (true) {
                let data;
                try {
                    data = await jsonConRetry(
                        `${cuenta.proxy}/api/orders/search?seller=${user_id}&offset=${offset}&limit=50&sort=date_desc&shipping.substatus=${substatus}`,
                        makeAuthOpts()
                    );
                } catch (e) {
                    invalidarToken(cuenta.proxy);
                    ({ access_token, user_id } = await getToken(cuenta));
                    data = await jsonConRetry(
                        `${cuenta.proxy}/api/orders/search?seller=${user_id}&offset=${offset}&limit=50&sort=date_desc&shipping.substatus=${substatus}`,
                        makeAuthOpts()
                    );
                }
                const orders = data.results || [];
                if (orders.length === 0) break;
                for (const o of orders) {
                    const sid = o.shipping?.id;
                    if (sid) shipIds.push({ sid, substatus });
                }
                if (orders.length < 50) break;
                offset += 50;
                if (offset >= 1000) break;
            }
            return shipIds;
        }

        // ★ Ambos substatuses EN PARALELO
        const [readyIds, bufferedIds] = await Promise.all([
            fetchSubstatus('ready_to_print'),
            fetchSubstatus('buffered')
        ]);

        // Deduplicar por ID de shipment
        const allShipMap = new Map();
        for (const { sid, substatus } of [...readyIds, ...bufferedIds]) {
            if (!allShipMap.has(sid)) allShipMap.set(sid, substatus);
        }

        // ★ Fetch de shipments en paralelo (lotes de 30)
        const shipEntries = [...allShipMap.entries()];
        const ships = new Map();

        const BATCH = 30;
        for (let i = 0; i < shipEntries.length; i += BATCH) {
            setProgress(`${cuenta.nombre}: shipments ${i}/${shipEntries.length}`);
            const batch = shipEntries.slice(i, i + BATCH);
            const results = await Promise.allSettled(
                batch.map(([sid]) =>
                    jsonConRetry(`${cuenta.proxy}/api/shipments/${sid}`, makeAuthOpts())
                )
            );
            for (const r of results) {
                if (r.status === 'fulfilled' && r.value?.id) {
                    ships.set(r.value.id, r.value);
                }
            }
        }

        // Contar
        let flex = 0, colecta = 0, buffered = 0;
        ships.forEach(s => {
            if (s.substatus === 'ready_to_print') {
                if (s.logistic_type === 'self_service') flex++;
                else colecta++;
            } else if (s.substatus === 'buffered') {
                buffered++;
            }
        });

        return { cuenta, flex, colecta, imprimir: flex + colecta, buffered, total: flex + colecta };
    }

    // ══════════════════════════════════════════════
    //  ORQUESTACIÓN
    // ══════════════════════════════════════════════

    async function cargarTodo(usarCachePrevia = false) {
        // Si hay caché reciente y no es carga forzada, mostrarla
        if (usarCachePrevia && resultadosCache && Date.now() - resultadosCache.fetchedAt < RESULTS_TTL_MS) {
            renderResultados(resultadosCache.data, true);
            return;
        }

        const btn = document.getElementById('reloadBtn');
        btn.disabled = true;
        document.getElementById('reloadIcon').textContent = '⟳';
        btn.querySelector('span').style.animation = 'spin 0.7s linear infinite';

        // Si hay datos cacheados, mostrarlos mientras carga
        if (resultadosCache) {
            renderResultados(resultadosCache.data, true);
        } else {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('content').innerHTML = `
                <div class="loading-state">
                    <div class="spinner"></div>
                    Cargando paquetes...
                    <div class="progress-text" id="progress"></div>
                </div>
            `;
        }

        setStatus('loading');

        // ★ Ambas cuentas EN PARALELO
        const settled = await Promise.allSettled(CUENTAS.map(c => cargarCuenta(c)));
        const resultados = settled.map((r, i) => {
            if (r.status === 'fulfilled') return r.value;
            console.error(`Error ${CUENTAS[i].nombre}:`, r.reason);
            return { cuenta: CUENTAS[i], flex: 0, colecta: 0, imprimir: 0, buffered: 0, total: 0, error: true };
        });
        const hayError = resultados.some(r => r.error);

        resultadosCache = { data: resultados, fetchedAt: Date.now() };
        renderResultados(resultados, false);

        btn.disabled = false;
        btn.querySelector('span').style.animation = '';
        actualizarHeaderTime();
        setStatus(hayError ? 'error' : 'live');
    }

    // ══════════════════════════════════════════════
    //  RENDER
    // ══════════════════════════════════════════════

    function renderResultados(resultados, fromCache = false) {
        const totFlex     = resultados.reduce((a, r) => a + r.flex, 0);
        const totColecta  = resultados.reduce((a, r) => a + r.colecta, 0);
        const totImprimir = resultados.reduce((a, r) => a + r.imprimir, 0);
        const totBuffered = resultados.reduce((a, r) => a + r.buffered, 0);

        // Hero
        const heroEl = document.getElementById('hero');
        heroEl.style.display = 'block';
        document.getElementById('heroNumber').textContent = totImprimir;
        document.getElementById('heroSub').textContent =
            totImprimir === 1 ? 'paquete' : 'paquetes';
        document.getElementById('heroCachedBadge').style.display = fromCache ? 'inline-block' : 'none';

        // Cards
        let html = '';
        resultados.forEach((r, i) => {
            const c = r.cuenta;
            const hasPrints = r.imprimir > 0;
            html += `
            <div class="cuenta-card ${c.css} animate-in ${hasPrints ? 'has-prints' : ''}"
                 style="animation-delay:${i * 0.12}s">
                <div class="card-header">
                    <div class="card-name">${c.nombre}</div>
                    <div class="card-imprimir">🖨️ <b>${r.imprimir}</b></div>
                </div>
                ${r.error ? `<div class="error-badge">⚠️ Error al cargar</div>` : `
                <div class="stats-grid">
                    <div class="stat-box flex">
                        <div class="stat-num">${r.flex}</div>
                        <div class="stat-lbl">🏍️ Flex</div>
                    </div>
                    <div class="stat-box colecta">
                        <div class="stat-num">${r.colecta}</div>
                        <div class="stat-lbl">📦 ${c.colectaLabel}</div>
                        <div class="stat-sub">${c.colectaDesc}</div>
                    </div>
                </div>
                ${r.buffered > 0 ? `<div class="buffered-row">⏳ ${r.buffered} pendiente${r.buffered !== 1 ? 's' : ''} (buffered)</div>` : ''}
                `}
            </div>`;
        });

        // Total card
        html += `
        <div class="cuenta-card total animate-in" style="animation-delay:${resultados.length * 0.12}s">
            <div class="card-header">
                <div class="card-name">Total</div>
                <div class="card-imprimir">🖨️ <b>${totImprimir}</b></div>
            </div>
            <div class="stats-grid">
                <div class="stat-box flex">
                    <div class="stat-num">${totFlex}</div>
                    <div class="stat-lbl">🏍️ Flex</div>
                </div>
                <div class="stat-box colecta">
                    <div class="stat-num">${totColecta}</div>
                    <div class="stat-lbl">📦 Colecta</div>
                </div>
            </div>
            ${totBuffered > 0 ? `<div class="buffered-row">⏳ ${totBuffered} pendiente${totBuffered !== 1 ? 's' : ''} (buffered)</div>` : ''}
        </div>`;

        document.getElementById('content').innerHTML = html;
    }

    // ══════════════════════════════════════════════
    //  UI UTILS
    // ══════════════════════════════════════════════

    function setProgress(txt) {
        const el = document.getElementById('progress');
        if (el) el.textContent = txt;
    }

    function actualizarHeaderTime() {
        const ahora = new Date();
        document.getElementById('headerTime').textContent =
            ahora.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    }

    function setStatus(state) {
        const row  = document.getElementById('statusRow');
        const dot  = document.getElementById('statusDot');
        const txt  = document.getElementById('statusText');
        row.style.display = 'flex';

        if (state === 'loading') {
            dot.className = 'dot';
            txt.textContent = 'actualizando...';
        } else if (state === 'live') {
            dot.className = 'dot live';
            const d = resultadosCache ? new Date(resultadosCache.fetchedAt) : new Date();
            txt.textContent = `actualizado ${d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })}`;
        } else if (state === 'error') {
            dot.className = 'dot error';
            txt.textContent = 'error en alguna cuenta';
        } else if (state === 'cached') {
            dot.className = 'dot cached';
            txt.textContent = 'datos en caché';
        }
    }

    // ══════════════════════════════════════════════
    //  AUTO-REFRESH & GESTOS
    // ══════════════════════════════════════════════

    // Auto-refresh cada 5 minutos
    setInterval(() => {
        if (!document.getElementById('reloadBtn').disabled) cargarTodo(false);
    }, 5 * 60 * 1000);

    // Pull to refresh
    let touchStartY = 0;
    document.addEventListener('touchstart', e => {
        if (window.scrollY === 0) touchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', e => {
        const diff = e.changedTouches[0].clientY - touchStartY;
        if (diff > 100 && window.scrollY === 0 && !document.getElementById('reloadBtn').disabled) {
            cargarTodo(false);
        }
    }, { passive: true });

    // Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
