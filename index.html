<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Despachos - Mikra + Chaya</title>
    <meta name="theme-color" content="#080810">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Despachos">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080810;
            --surface: #0f0f1a;
            --surface-2: #16162a;
            --border: #1c1c2e;
            --border-bright: #2a2a40;
            --text: #e0e0f0;
            --muted: #6a6a85;
            --muted-2: #8a8aa5;
            --yellow: #FFE600;
            --green: #00e676;
            --blue: #40c4ff;
            --red: #ff4444;
            --purple: #d070ff;
            --orange: #ffaa44;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 0 24px;
        }

        /* ── HEADER ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8,8,16,0.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
        .header-title span { color: var(--yellow); }
        .header-time {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        /* ── HERO ── */
        .hero {
            text-align: center;
            padding: 18px 16px 10px;
            display: none;
        }
        .hero-label {
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .hero-number-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        .hero-number {
            font-family: 'Space Mono', monospace;
            font-size: 60px;
            font-weight: 700;
            color: var(--yellow);
            line-height: 1;
            text-shadow: 0 0 32px rgba(255,230,0,0.28);
        }
        .hero-avg {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 500;
            color: var(--muted-2);
        }
        .hero-avg small {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 9px;
            color: var(--muted);
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* ── Tasas mini (siempre visibles al lado del número) ── */
        .hero-rates-mini {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            align-self: center;
            gap: 3px;
            padding: 7px 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-bright);
            border-radius: 10px;
            min-width: 68px;
        }
        .hrm-total-row {
            display: flex;
            align-items: baseline;
            gap: 2px;
            line-height: 1;
        }
        .hrm-total-val {
            font-family: 'Space Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }
        .hrm-total-unit {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            color: var(--muted);
        }
        .hrm-breakdown {
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
        }
        .hrm-flex  { color: var(--green); }
        .hrm-col   { color: var(--blue); }
        .hrm-bsep  { color: var(--border-bright); font-size: 9px; }

        .hero-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

        /* ── Tiempo de preparación (siempre visible) ── */
        .hero-tiempo {
            margin-top: 5px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }
        .hero-tiempo .ht-val {
            font-size: 13px;
            font-weight: 700;
            color: var(--orange);
        }

        /* ── Tiempo en el panel de proyección ── */
        .proy-tiempo-row {
            margin-top: 9px;
            padding: 9px 12px;
            background: rgba(255,170,68,0.05);
            border: 1px solid rgba(255,170,68,0.18);
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            align-items: center;
            gap: 0 10px;
        }
        .pt-divider { background: var(--border); width: 1px; min-height: 38px; }
        .pt-col { text-align: center; }
        .pt-label {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-family: 'Space Mono', monospace;
        }
        .pt-val {
            font-family: 'Space Mono', monospace;
            font-size: 17px;
            font-weight: 700;
            color: var(--orange);
            margin-top: 2px;
            line-height: 1;
        }
        .pt-sub {
            font-size: 9px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            margin-top: 2px;
        }
        .hero-units {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: rgba(255,230,0,0.55);
            margin-top: 2px;
        }
        .hero-cached-badge {
            display: inline-block;
            margin-top: 6px;
            background: rgba(255,230,0,0.08);
            border: 1px solid rgba(255,230,0,0.2);
            color: rgba(255,230,0,0.6);
            border-radius: 20px;
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            padding: 3px 10px;
        }

        /* ── BARRA DE ACCIONES (proyección + actualizar) ── */
        .action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px 10px;
            gap: 8px;
        }
        .proy-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted-2);
            padding: 5px 12px;
            border: 1px solid var(--border-bright);
            border-radius: 20px;
            background: transparent;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }
        .proy-toggle:hover, .proy-toggle:active { border-color: var(--yellow); color: var(--yellow); }
        .proy-chevron { font-size: 8px; transition: transform 0.25s; }
        .proy-toggle.open .proy-chevron { transform: rotate(180deg); }

        .reload-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--border-bright);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            line-height: 1;
            transition: all 0.2s;
            flex-shrink: 0;
            padding: 0;
        }
        .reload-btn:hover, .reload-btn:active { border-color: var(--yellow); color: var(--yellow); }
        .reload-btn:disabled { opacity: 0.35; cursor: wait; }

        /* ── Total al corte (siempre visible) ── */
        .proy-quick {
            flex: 1;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 2px;
            font-family: 'Space Mono', monospace;
        }
        .pq-aprox {
            font-size: 13px;
            color: rgba(255,230,0,0.55);
            line-height: 1;
        }
        .pq-val {
            font-size: 26px;
            font-weight: 700;
            color: var(--yellow);
            line-height: 1;
            text-shadow: 0 0 18px rgba(255,230,0,0.22);
        }
        .pq-lbl {
            font-size: 9px;
            color: var(--muted);
            align-self: flex-end;
            padding-bottom: 3px;
            white-space: nowrap;
        }

        /* ── PROYECCIÓN PANEL ── */
        .proy-panel {
            margin: 0 14px 10px;
            background: rgba(255,230,0,0.03);
            border: 1px solid rgba(255,230,0,0.12);
            border-radius: 12px;
            padding: 10px 14px 10px;
        }
        .proy-grid {
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            gap: 0 10px;
            align-items: start;
        }
        .proy-div {
            background: var(--border);
            width: 1px;
            height: 100%;
            min-height: 60px;
        }
        .proy-col { padding: 0 2px; }
        .proy-tipo-header {
            font-size: 10px;
            font-weight: 700;
            color: var(--muted-2);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 5px;
            display: flex;
            align-items: baseline;
            gap: 4px;
            flex-wrap: wrap;
        }
        .proy-cutoff {
            font-weight: 400;
            font-size: 9px;
            color: var(--muted);
            text-transform: none;
            letter-spacing: 0;
        }
        .proy-rate {
            font-family: 'Space Mono', monospace;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }
        .proy-rate-unit {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            margin-top: 1px;
        }
        .proy-interval {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            margin-top: 3px;
        }
        .proy-proj-total {
            margin-top: 7px;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: var(--yellow);
        }
        .proy-proj-total.passed { color: var(--muted); font-size: 11px; }
        .proy-proj-total.no-data { color: var(--muted-2); }
        .proy-proj-label {
            font-size: 9px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            margin-top: 1px;
        }
        .proy-total-row {
            margin-top: 9px;
            padding: 8px 10px;
            background: rgba(255,230,0,0.05);
            border: 1px solid rgba(255,230,0,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .ptr-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--muted-2);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .ptr-val {
            font-family: 'Space Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--yellow);
        }
        .ptr-sub {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            margin-top: 1px;
            text-align: right;
        }

        .proy-note {
            margin-top: 8px;
            padding-top: 7px;
            border-top: 1px solid var(--border);
            font-size: 9px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            text-align: center;
        }


        /* ── CARDS ── */
        .content { padding: 0 12px; }

        .cuenta-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 14px 14px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .cuenta-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }
        .cuenta-card.mikra::before { background: linear-gradient(90deg, #9C27B0, #d070ff); }
        .cuenta-card.chaya::before { background: linear-gradient(90deg, #FF6B00, #ffaa44); }
        .cuenta-card.total {
            background: linear-gradient(135deg, var(--surface), #14142a);
            border-color: rgba(255,230,0,0.18);
            cursor: default;
        }
        .cuenta-card.total.total-expandible { cursor: pointer; }
        .cuenta-card.total::before { background: linear-gradient(90deg, #b8a000, var(--yellow)); }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .card-name { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
        .mikra .card-name { color: var(--purple); }
        .chaya .card-name { color: var(--orange); }
        .total .card-name { color: var(--yellow); }

        .card-horario {
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--muted-2);
        }
        .card-horario b { color: var(--text); font-weight: 700; }
        .card-horario.urgent b {
            color: var(--red);
            animation: pulse-txt 1.5s ease infinite;
        }
        .card-horario.passed { opacity: 0.45; }
        .card-horario.none { opacity: 0.5; font-size: 11px; }

        @keyframes pulse-txt {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* ── SECCIÓN Flex/Colecta con números grandes ── */
        .section-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.8px;
            margin-bottom: 8px;
            padding-left: 2px;
        }
        .section-label.imprimir { color: #ffddaa; }
        .section-label.impresos { color: var(--muted-2); }

        .tipo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .tipo-box {
            background: var(--surface-2);
            border-radius: 10px;
            padding: 10px 8px 9px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .tipo-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
        }
        .tipo-box.flex::before { background: var(--green); }
        .tipo-box.colecta::before { background: var(--blue); }

        .tipo-lbl {
            font-size: 10px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 2px;
        }
        .tipo-num {
            font-family: 'Space Mono', monospace;
            font-size: 30px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }
        .tipo-num.zero { color: #3a3a55; font-weight: 400; }
        .tipo-uni {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted-2);
            margin-top: 3px;
        }
        .tipo-uni.zero { color: #3a3a55; }

        /* Impresos: más chicos que imprimir pero legibles */
        .impresos-grid .tipo-num { font-size: 24px; color: var(--muted-2); }
        .impresos-grid .tipo-num.zero { color: #3a3a55; }
        .impresos-grid .tipo-uni { color: var(--muted); }
        .impresos-grid .tipo-box { background: rgba(22,22,42,0.5); }

        /* ── DETALLE EXPANDIBLE (Impresos) ── */
        .card-impresos {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, margin-top 0.35s ease, padding-top 0.35s ease;
        }
        .cuenta-card.expanded .card-impresos {
            max-height: 180px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .cuenta-card.expanded .expand-hint { opacity: 0; height: 0; margin: 0; padding: 0; }

        .expand-hint {
            text-align: center;
            margin-top: 8px;
            font-size: 10px;
            color: var(--muted);
            transition: opacity 0.3s;
            font-family: 'Space Mono', monospace;
        }

        /* ── Buffered ── */
        .buffered-row {
            margin-top: 8px;
            text-align: center;
            font-size: 10px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
        }

        /* ── Todo al día ── */
        .all-clear-compact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 14px;
            background: rgba(0,230,118,0.06);
            border: 1px solid rgba(0,230,118,0.18);
            border-radius: 9px;
            color: var(--green);
            font-size: 13px;
            font-weight: 600;
        }

        /* ── ERROR ── */
        .error-badge {
            padding: 10px;
            background: rgba(255,68,68,0.1);
            border: 1px solid rgba(255,68,68,0.25);
            color: #ff7070;
            border-radius: 9px;
            font-size: 12px;
            text-align: center;
        }

        /* ── LOADING ── */
        .loading-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #1c1c2e;
            border-top-color: var(--yellow);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-text {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: #333346;
            margin-top: 8px;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeUp 0.3s ease forwards; }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 transparent; }
            50% { box-shadow: 0 0 12px 1px rgba(255,230,0,0.12); }
        }
        .has-prints { animation: pulse-border 2.5s ease infinite; }

        /* ── STATUS DOT ── */
        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 14px 16px 0;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted);
        }
        .dot-status { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
        .dot-status.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .dot-status.cached { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
        .dot-status.error { background: var(--red); }

        /* ── Total ventas mini al lado del nombre ── */
        .ventas-mini {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            opacity: 0.7;
            margin-left: 6px;
        }
        .ventas-mini b { color: var(--muted-2); font-weight: 700; }

        /* ── Sección "Por escanear" ── */
        .escanear-block {
            margin-top: 10px;
            padding: 9px 10px;
            background: rgba(64,196,255,0.06);
            border: 1px solid rgba(64,196,255,0.18);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .escanear-block.zero {
            background: transparent;
            border-color: var(--border);
            opacity: 0.5;
        }
        .escanear-lbl {
            font-size: 10px;
            color: #80d8ff;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
        }
        .escanear-block.zero .escanear-lbl { color: var(--muted); }
        .escanear-vals {
            display: flex;
            align-items: baseline;
            gap: 10px;
            font-family: 'Space Mono', monospace;
        }
        .escanear-vals .ev-num {
            font-size: 18px;
            font-weight: 700;
            color: var(--blue);
        }
        .escanear-block.zero .escanear-vals .ev-num { color: #3a3a55; font-weight: 400; }
        .escanear-vals .ev-tipo {
            font-size: 10px;
            color: var(--muted);
        }
        .escanear-block.zero .ev-tipo { color: #3a3a55; }

        /* ── HORARIO STALE WARNING ── */
        .stale-warning {
            margin: 8px 16px 0;
            padding: 8px 10px;
            background: rgba(255,170,68,0.1);
            border: 1px solid rgba(255,170,68,0.25);
            border-radius: 8px;
            font-size: 11px;
            color: var(--orange);
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">📦 <span>Despachos</span></div>
        <div class="header-time" id="headerTime">—</div>
    </div>

    <div class="hero" id="hero">
        <div class="hero-label">Para imprimir</div>
        <div class="hero-number-row">
            <div class="hero-number" id="heroNumber">0</div>
            <div class="hero-avg" id="heroAvg" style="display:none">
                <span id="heroAvgNum">—</span>
                <small>u/paq</small>
            </div>
            <div class="hero-rates-mini" id="heroRatesMini" style="display:none">
                <div class="hrm-total-row">
                    <span class="hrm-total-val" id="heroTotalRate">—</span>
                    <span class="hrm-total-unit">/h</span>
                </div>
                <div class="hrm-breakdown">
                    <span class="hrm-flex">🏍️<span id="heroFlexRate">—</span></span>
                    <span class="hrm-bsep">·</span>
                    <span class="hrm-col">📦<span id="heroColectaRate">—</span></span>
                </div>
            </div>
        </div>

    <script>
    // ══════════════════════════════════════════════
    //  CONFIG
    // ══════════════════════════════════════════════
    const CUENTAS = [
        {
            nombre: 'Mikra',
            proxy: 'https://mikra-flex-proxy.rafaelassir.workers.dev',
            css: 'mikra',
            colectaLabel: 'Colecta'
        },
        {
            nombre: 'Chaya',
            proxy: 'https://chaya-flex-proxy.rafaelassir.workers.dev',
            css: 'chaya',
            colectaLabel: 'Despacho'
        }
    ];

    const AUTH_WORKER = 'https://ml-auth-codes.rafaelassir.workers.dev';
    let HORARIOS = { Mikra: {}, Chaya: {} };
    let HORARIOS_META = { Mikra: null, Chaya: null };

    const TOKEN_TTL_MS   = 55 * 60 * 1000;
    const RESULTS_TTL_MS =  3 * 60 * 1000;
    const FETCH_TIMEOUT  = 12_000;
    const MAX_RETRIES    = 3;
    const RETRY_DELAY_MS = 600;
    const STALE_DAYS     = 2;

    // Flex corta a las 14:00 en ambas cuentas.
    // Colecta: las ventas que entran en el envío deben llegar antes de las 15:00.
    const FLEX_CORTE_H = 14, FLEX_CORTE_M = 0;
    const COLECTA_CORTE_H = 15, COLECTA_CORTE_M = 0;

    const tokenCache = {};
    let   resultadosCache = null;

    // ══════════════════════════════════════════════
    //  HELPERS
    // ══════════════════════════════════════════════
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function fetchConTimeout(url, opts = {}, timeout = FETCH_TIMEOUT) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), timeout);
        try { return await fetch(url, { ...opts, signal: ctrl.signal }); }
        finally { clearTimeout(timer); }
    }

    async function fetchConRetry(url, opts = {}, retries = MAX_RETRIES) {
        for (let i = 0; i <= retries; i++) {
            try {
                const resp = await fetchConTimeout(url, opts);
                if (resp.ok) return resp;
                if (resp.status === 429) { await sleep(RETRY_DELAY_MS * (i + 1) * 2); continue; }
                if (resp.status >= 400 && resp.status < 500) throw new Error(`HTTP ${resp.status}`);
                if (i < retries) await sleep(RETRY_DELAY_MS * (i + 1));
            } catch (e) {
                if (i === retries) throw e;
                await sleep(RETRY_DELAY_MS * (i + 1));
            }
        }
        throw new Error(`Falló tras ${retries} reintentos`);
    }

    async function jsonConRetry(url, opts = {}) {
        const resp = await fetchConRetry(url, opts);
        return resp.json();
    }

    // ══════════════════════════════════════════════
    //  TOKEN
    // ══════════════════════════════════════════════
    async function getToken(cuenta) {
        const cached = tokenCache[cuenta.proxy];
        if (cached && Date.now() < cached.expiresAt) {
            return { access_token: cached.token, user_id: cached.userId };
        }
        const data = await jsonConRetry(`${cuenta.proxy}/get-token`);
        tokenCache[cuenta.proxy] = {
            token: data.access_token,
            userId: data.user_id,
            expiresAt: Date.now() + TOKEN_TTL_MS
        };
        return data;
    }
    function invalidarToken(proxy) { delete tokenCache[proxy]; }

    // ══════════════════════════════════════════════
    //  CARGA POR CUENTA
    // ══════════════════════════════════════════════
    async function cargarCuenta(cuenta) {
        let { access_token, user_id } = await getToken(cuenta);
        const makeAuthOpts = () => ({ headers: { 'Authorization': `Bearer ${access_token}` } });

        async function fetchSubstatus(substatus) {
            const items = [];
            let offset = 0;
            while (true) {
                let data;
                const url = `${cuenta.proxy}/api/orders/search?seller=${user_id}&offset=${offset}&limit=50&sort=date_desc&shipping.substatus=${substatus}`;
                try {
                    data = await jsonConRetry(url, makeAuthOpts());
                } catch (e) {
                    invalidarToken(cuenta.proxy);
                    ({ access_token, user_id } = await getToken(cuenta));
                    data = await jsonConRetry(url, makeAuthOpts());
                }
                const orders = data.results || [];
                if (orders.length === 0) break;
                for (const o of orders) {
                    const sid = o.shipping?.id;
                    if (!sid) continue;
                    const qty = (o.order_items || []).reduce((a, it) => a + (it.quantity || 0), 0);
                    // Capturar fecha de la orden para cálculo de velocidad
                    items.push({ sid, substatus, qty, date: o.date_created || null });
                }
                if (orders.length < 50) break;
                offset += 50;
                if (offset >= 1000) break;
            }
            return items;
        }

        async function fetchShippedRecientes() {
            const items = [];
            const desde = new Date(); desde.setDate(desde.getDate() - 7);
            const desdeISO = encodeURIComponent(desde.toISOString().split('.')[0] + '.000-00:00');
            const hasta = new Date(); hasta.setDate(hasta.getDate() + 1);
            const hastaISO = encodeURIComponent(hasta.toISOString().split('.')[0] + '.000-00:00');
            const filter = `&order.date_created.from=${desdeISO}&order.date_created.to=${hastaISO}&order.status=paid&shipping.status=shipped`;
            let offset = 0;
            while (true) {
                let data;
                const url = `${cuenta.proxy}/api/orders/search?seller=${user_id}&offset=${offset}&limit=50&sort=date_desc${filter}`;
                try { data = await jsonConRetry(url, makeAuthOpts()); }
                catch (e) {
                    invalidarToken(cuenta.proxy);
                    ({ access_token, user_id } = await getToken(cuenta));
                    data = await jsonConRetry(url, makeAuthOpts());
                }
                const orders = data.results || [];
                if (orders.length === 0) break;
                for (const o of orders) {
                    const sid = o.shipping?.id;
                    if (!sid) continue;
                    const qty = (o.order_items || []).reduce((a, it) => a + (it.quantity || 0), 0);
                    items.push({ sid, qty, date: o.date_created || null });
                }
                if (orders.length < 50) break;
                offset += 50;
                if (offset >= 500) break;
            }
            return items;
        }

        const [readyItems, printedItems, pickupItems, bufferedItems, shippedRecientes] = await Promise.all([
            fetchSubstatus('ready_to_print'),
            fetchSubstatus('printed'),
            fetchSubstatus('ready_for_pickup'),
            fetchSubstatus('buffered'),
            fetchShippedRecientes()
        ]);

        const PRIORIDAD = { ready_to_print: 4, printed: 3, ready_for_pickup: 2, buffered: 1 };
        const allShipMap = new Map();
        for (const it of [...readyItems, ...printedItems, ...pickupItems, ...bufferedItems]) {
            const existing = allShipMap.get(it.sid);
            if (!existing) {
                allShipMap.set(it.sid, { substatus: it.substatus, qty: it.qty, date: it.date });
            } else {
                existing.qty += it.qty;
                if (PRIORIDAD[it.substatus] > PRIORIDAD[existing.substatus]) {
                    existing.substatus = it.substatus;
                }
                // Conservar la fecha más temprana para mejor estimación de velocidad
                if (it.date && (!existing.date || it.date < existing.date)) existing.date = it.date;
            }
        }

        const shippedShipMap = new Map();
        for (const it of shippedRecientes) {
            shippedShipMap.set(it.sid, { qty: it.qty, date: it.date });
        }

        const allSidsSet = new Set([...allShipMap.keys(), ...shippedShipMap.keys()]);
        const shipEntries = [...allSidsSet];
        const ships = new Map();
        const BATCH = 30;
        for (let i = 0; i < shipEntries.length; i += BATCH) {
            setProgress(`${cuenta.nombre}: shipments ${i}/${shipEntries.length}`);
            const batch = shipEntries.slice(i, i + BATCH);
            const results = await Promise.allSettled(
                batch.map(sid => jsonConRetry(`${cuenta.proxy}/api/shipments/${sid}`, makeAuthOpts()))
            );
            for (const r of results) {
                if (r.status === 'fulfilled' && r.value?.id) ships.set(r.value.id, r.value);
            }
        }

        const ready    = { flex: 0, flexUni: 0, colecta: 0, colectaUni: 0 };
        const printed  = { flex: 0, flexUni: 0, colecta: 0, colectaUni: 0 };
        const pendEsc  = { flex: 0, flexUni: 0, colecta: 0, colectaUni: 0 };
        let buffered = 0, bufferedUni = 0;

        // Últimas 24h (no desde medianoche, para que funcione bien a las 00:xx)
        const todayTs = Date.now() - 24 * 60 * 60 * 1000;
        const flexDatesAll = [], colectaDatesAll = [];

        ships.forEach(s => {
            const isFlex = s.logistic_type === 'self_service';

            const meta = allShipMap.get(s.id);
            if (meta) {
                const q = meta.qty;
                const orderTs = meta.date ? new Date(meta.date).getTime() : 0;
                const isToday = orderTs >= todayTs;

                if (meta.substatus === 'ready_to_print') {
                    if (isFlex) {
                        ready.flex++; ready.flexUni += q;
                        if (isToday && meta.date) flexDatesAll.push(meta.date);
                    } else {
                        ready.colecta++; ready.colectaUni += q;
                        if (isToday && meta.date) colectaDatesAll.push(meta.date);
                    }
                } else if (meta.substatus === 'printed' || meta.substatus === 'ready_for_pickup') {
                    if (isFlex) {
                        printed.flex++; printed.flexUni += q;
                        if (isToday && meta.date) flexDatesAll.push(meta.date);
                    } else {
                        printed.colecta++; printed.colectaUni += q;
                        if (isToday && meta.date) colectaDatesAll.push(meta.date);
                    }
                } else if (meta.substatus === 'buffered') {
                    buffered++; bufferedUni += q;
                }
            }

            if (shippedShipMap.has(s.id)) {
                const sm = shippedShipMap.get(s.id);
                const sentDate = s.status_history?.date_shipped;
                const delivered = s.status_history?.date_delivered;
                if (!sentDate && !delivered && s.status === 'shipped') {
                    const q = sm.qty || 1;
                    if (isFlex) { pendEsc.flex++; pendEsc.flexUni += q; }
                    else        { pendEsc.colecta++; pendEsc.colectaUni += q; }
                }
                // Incluir órdenes ya despachadas de hoy para mejor muestra de velocidad
                const orderTs = sm.date ? new Date(sm.date).getTime() : 0;
                if (orderTs >= todayTs && sm.date) {
                    if (isFlex) flexDatesAll.push(sm.date);
                    else colectaDatesAll.push(sm.date);
                }
            }
        });

        ready.total      = ready.flex + ready.colecta;
        ready.totalUni   = ready.flexUni + ready.colectaUni;
        printed.total    = printed.flex + printed.colecta;
        printed.totalUni = printed.flexUni + printed.colectaUni;
        pendEsc.total    = pendEsc.flex + pendEsc.colecta;
        pendEsc.totalUni = pendEsc.flexUni + pendEsc.colectaUni;

        return { cuenta, ready, printed, pendEsc, buffered, bufferedUni, flexDatesAll, colectaDatesAll };
    }

    // ══════════════════════════════════════════════
    //  HORARIOS DEL WORKER
    // ══════════════════════════════════════════════
    async function cargarHorarios() {
        await Promise.allSettled(CUENTAS.map(async c => {
            try {
                const res = await fetch(`${AUTH_WORKER}/get-horario/${c.nombre.toLowerCase()}`);
                if (!res.ok) return;
                const data = await res.json();
                if (data.horarios) {
                    const h = {};
                    for (const [k, v] of Object.entries(data.horarios)) h[Number(k)] = v;
                    HORARIOS[c.nombre] = h;
                    HORARIOS_META[c.nombre] = { fecha: data.fecha, updated: data.updated };
                }
            } catch(e) {}
        }));
    }

    function checkStaleness() {
        const warning = document.getElementById('staleWarning');
        const now = Date.now();
        let maxAge = 0;
        for (const c of CUENTAS) {
            const meta = HORARIOS_META[c.nombre];
            if (!meta?.updated) continue;
            const age = (now - new Date(meta.updated).getTime()) / (1000 * 60 * 60 * 24);
            if (age > maxAge) maxAge = age;
        }
        if (maxAge > STALE_DAYS) {
            const dias = Math.floor(maxAge);
            warning.textContent = `⚠️ Horarios de hace ${dias} día${dias !== 1 ? 's' : ''} · recargá /ventas/ en ambas cuentas`;
            warning.style.display = 'block';
        } else {
            warning.style.display = 'none';
        }
    }

    // ══════════════════════════════════════════════
    //  PROYECCIÓN — VELOCIDAD DE VENTAS
    // ══════════════════════════════════════════════

    // Calcula pedidos/hora e intervalo promedio a partir de un array de fechas ISO.
    function calcVelocidad(dates) {
        if (!dates || dates.length < 2) return null;
        const sorted = dates.map(d => new Date(d).getTime()).sort((a, b) => a - b);
        const spanMs = sorted[sorted.length - 1] - sorted[0];
        const spanHours = spanMs / (1000 * 60 * 60);
        if (spanHours < 0.016) return null; // span menor a 1 minuto, no es útil
        const perHour = dates.length / spanHours;
        const intervalMin = 60 / perHour;
        return { perHour, intervalMin, count: dates.length, spanHours };
    }

    // Proyecta cuántos pedidos más llegarán entre ahora y el horario de corte.
    // Si el corte de hoy ya pasó, proyecta al corte de mañana.
    function proyectarHasta(currentPending, vel, corteH, corteM) {
        const now = new Date();
        const corte = new Date();
        corte.setHours(corteH, corteM, 0, 0);
        let esMañana = false;
        if (corte <= now) {
            corte.setDate(corte.getDate() + 1);
            esMañana = true;
        }
        const remainHours = (corte - now) / (1000 * 60 * 60);
        if (!vel) return { passed: false, total: null, more: null, remainHours, esMañana };
        const more = Math.round(vel.perHour * remainHours);
        return { passed: false, more, total: currentPending + more, remainHours, esMañana };
    }

    function fmtRate(perHour) {
        if (perHour >= 10) return perHour.toFixed(0);
        if (perHour >= 1)  return perHour.toFixed(1);
        return (perHour * 60).toFixed(1); // menos de 1/h → mostrar por hora igual
    }

    // 50 paquetes = 35 minutos → 0.7 min/paq
    const MIN_POR_PAQ = 35 / 50;

    function calcTiempoPrep(paquetes) {
        return Math.round(paquetes * MIN_POR_PAQ);
    }

    function fmtTiempo(minutos) {
        if (minutos <= 0) return '—';
        if (minutos < 60) return `${minutos}min`;
        const h = Math.floor(minutos / 60);
        const m = minutos % 60;
        return m === 0 ? `${h}h` : `${h}h ${m}min`;
    }

    function fmtInterval(min) {
        if (min < 1)   return `c/ ${Math.round(min * 60)} seg`;
        if (min < 90)  return `c/ ${Math.round(min)} min`;
        return `c/ ${(min / 60).toFixed(1)} h`;
    }

    // Retorna el horario de corte de ventas de colecta leyendo HORARIOS.
    // El cutoff en HORARIOS es el horario de despacho; las ventas cierran 30 min antes.
    // Si no hay datos cargados, usa el default 15:00.
    function getColectaCorte() {
        let minMin = COLECTA_CORTE_H * 60 + COLECTA_CORTE_M;
        let found = false;
        for (const c of CUENTAS) {
            const h = getHorarioHoy(c.nombre);
            if (!h || !h.cutoff) continue;
            const m = h.cutoff.match(/(\d{1,2}):(\d{2})/);
            if (!m) continue;
            const dispMin = Number(m[1]) * 60 + Number(m[2]);
            const salesMin = dispMin - 30; // ventas cierran 30 min antes del despacho
            if (!found || salesMin < minMin) { minMin = salesMin; found = true; }
        }
        return { h: Math.floor(minMin / 60), m: minMin % 60 };
    }

    window.toggleProy = function() {
        const toggle = document.getElementById('proyToggle');
        const panel  = document.getElementById('proyPanel');
        const isOpen = toggle.classList.contains('open');
        toggle.classList.toggle('open', !isOpen);
        panel.style.display = isOpen ? 'none' : 'block';
    };

    function renderProyeccion(resultados) {
        const toggle = document.getElementById('proyToggle');
        if (!toggle) return;

        const allFlexDates    = resultados.flatMap(r => r.flexDatesAll    || []);
        const allColectaDates = resultados.flatMap(r => r.colectaDatesAll || []);

        const sum = (key, sub) => resultados.reduce((a, r) => a + (r[key]?.[sub] || 0), 0);
        const flexPending    = sum('ready', 'flex')    + sum('printed', 'flex');
        const colectaPending = sum('ready', 'colecta') + sum('printed', 'colecta');

        const velFlex    = calcVelocidad(allFlexDates);
        const velColecta = calcVelocidad(allColectaDates);

        // Corte de colecta desde HORARIOS (ventas = despacho - 30 min)
        const colCorte = getColectaCorte();
        const projFlex    = proyectarHasta(flexPending,    velFlex,    FLEX_CORTE_H, FLEX_CORTE_M);
        const projColecta = proyectarHasta(colectaPending, velColecta, colCorte.h,   colCorte.m);

        // ── Mini bloque: total/h + desglose flex/colecta ──
        const totalPerHour = (velFlex?.perHour || 0) + (velColecta?.perHour || 0);
        const hasAnyVel    = velFlex || velColecta;

        document.getElementById('heroTotalRate').textContent   = hasAnyVel ? fmtRate(totalPerHour) : '—';
        document.getElementById('heroFlexRate').textContent    = velFlex    ? fmtRate(velFlex.perHour)    : '—';
        document.getElementById('heroColectaRate').textContent = velColecta ? fmtRate(velColecta.perHour) : '—';
        document.getElementById('heroRatesMini').style.display = 'flex';

        // ── Panel: Flex ──
        const flexRateEl = document.getElementById('flexRate');
        const flexIntEl  = document.getElementById('flexInterval');
        const flexProjEl = document.getElementById('flexProjTotal');
        const flexLblEl  = document.getElementById('flexProjLabel');
        const flexCorteStr = `${String(FLEX_CORTE_H).padStart(2,'0')}:${String(FLEX_CORTE_M).padStart(2,'0')}`;
        const flexCorteLabel = projFlex.esMañana ? `mañana ${flexCorteStr}` : flexCorteStr;

        document.querySelector('#proyPanel .proy-col:first-child .proy-cutoff').textContent = `· hasta ${flexCorteLabel}`;
        if (velFlex) {
            flexRateEl.textContent = fmtRate(velFlex.perHour);
            flexIntEl.textContent  = fmtInterval(velFlex.intervalMin);
        } else {
            flexRateEl.textContent = allFlexDates.length === 0 ? '—' : '< 2';
            flexIntEl.textContent  = 'pocos datos';
        }
        if (projFlex.total !== null) {
            flexProjEl.textContent = `≈ ${projFlex.total}`;
            flexProjEl.className   = 'proy-proj-total';
            flexLblEl.textContent  = `+${projFlex.more} más`;
        } else {
            flexProjEl.textContent = `${flexPending} ahora`;
            flexProjEl.className   = 'proy-proj-total no-data';
            flexLblEl.textContent  = 'sin datos';
        }

        // ── Panel: Colecta ──
        const colRateEl = document.getElementById('colectaRate');
        const colIntEl  = document.getElementById('colectaInterval');
        const colProjEl = document.getElementById('colectaProjTotal');
        const colLblEl  = document.getElementById('colectaProjLabel');
        const colCorteStr = `${String(colCorte.h).padStart(2,'0')}:${String(colCorte.m).padStart(2,'0')}`;
        const colCorteLabel = projColecta.esMañana ? `mañana ${colCorteStr}` : colCorteStr;

        document.getElementById('colectaCutoffLabel').textContent = `· hasta ${colCorteLabel}`;
        if (velColecta) {
            colRateEl.textContent = fmtRate(velColecta.perHour);
            colIntEl.textContent  = fmtInterval(velColecta.intervalMin);
        } else {
            colRateEl.textContent = allColectaDates.length === 0 ? '—' : '< 2';
            colIntEl.textContent  = 'pocos datos';
        }
        if (projColecta.total !== null) {
            colProjEl.textContent = `≈ ${projColecta.total}`;
            colProjEl.className   = 'proy-proj-total';
            colLblEl.textContent  = `+${projColecta.more} más`;
        } else {
            colProjEl.textContent = `${colectaPending} ahora`;
            colProjEl.className   = 'proy-proj-total no-data';
            colLblEl.textContent  = 'sin datos';
        }

        // ── Total combinado al corte (panel + indicador rápido siempre visible) ──
        const totalRow  = document.getElementById('proyTotalRow');
        const quickEl   = document.getElementById('proyQuick');
        const quickValEl = document.getElementById('proyQuickVal');
        const hasOneProj = projFlex.total !== null || projColecta.total !== null;
        if (hasOneProj) {
            const tot     = (projFlex.total || flexPending) + (projColecta.total || colectaPending);
            const moreTot = (projFlex.more || 0) + (projColecta.more || 0);
            // Panel interior
            document.getElementById('proyTotalVal').textContent = `≈ ${tot}`;
            document.getElementById('proyTotalSub').textContent = moreTot > 0 ? `+${moreTot} más hasta el corte` : 'al corte';
            totalRow.style.display = 'flex';
            // Indicador rápido en la barra
            quickValEl.textContent = tot;
            quickEl.style.display  = 'flex';
        } else {
            totalRow.style.display = 'none';
            quickEl.style.display  = 'none';
        }

        // ── Tiempo de preparación (ahora vs al corte) ──
        const tiempoRow = document.getElementById('proyTiempoRow');
        const totalAhora  = flexPending + colectaPending;
        const totalCorte  = hasOneProj
            ? (projFlex.total || flexPending) + (projColecta.total || colectaPending)
            : null;
        if (totalAhora > 0 || totalCorte) {
            const minAhoraP = calcTiempoPrep(totalAhora);
            document.getElementById('ptValAhora').textContent = fmtTiempo(minAhoraP);
            document.getElementById('ptSubAhora').textContent = `${totalAhora} paq`;
            if (totalCorte !== null) {
                const minCorte = calcTiempoPrep(totalCorte);
                document.getElementById('ptValCorte').textContent = fmtTiempo(minCorte);
                document.getElementById('ptSubCorte').textContent = `≈ ${totalCorte} paq`;
            } else {
                document.getElementById('ptValCorte').textContent = '—';
                document.getElementById('ptSubCorte').textContent = 'sin datos';
            }
            tiempoRow.style.display = 'grid';
        } else {
            tiempoRow.style.display = 'none';
        }

        // ── Nota muestra ──
        const totalDates = allFlexDates.length + allColectaDates.length;
        const noteEl = document.getElementById('proyNote');
        if (totalDates === 0) {
            noteEl.textContent = 'sin órdenes en las últimas 24h';
        } else if (totalDates < 4) {
            noteEl.textContent = `muestra pequeña · ${totalDates} orden${totalDates !== 1 ? 'es' : ''} en 24h`;
        } else {
            noteEl.textContent = `basado en ${totalDates} órdenes de las últimas 24h`;
        }

        toggle.style.display = 'inline-flex';
    }

    // ══════════════════════════════════════════════
    //  ORQUESTACIÓN
    // ══════════════════════════════════════════════
    async function cargarTodo(usarCachePrevia = false) {
        if (usarCachePrevia && resultadosCache && Date.now() - resultadosCache.fetchedAt < RESULTS_TTL_MS) {
            renderResultados(resultadosCache.data, true);
            return;
        }

        const btn = document.getElementById('reloadBtn');
        btn.disabled = true;
        document.getElementById('reloadIcon').textContent = '⟳';
        document.getElementById('reloadIcon').style.animation = 'spin 0.7s linear infinite';

        // Ocultar panel de proyección mientras carga
        const proyToggle = document.getElementById('proyToggle');
        const proyPanel  = document.getElementById('proyPanel');
        proyToggle.style.display = 'none';
        proyPanel.style.display  = 'none';
        proyToggle.classList.remove('open');
        document.getElementById('heroRatesMini').style.display = 'none';
        document.getElementById('proyQuick').style.display   = 'none';
        document.getElementById('heroTiempo').style.display  = 'none';

        if (resultadosCache) {
            renderResultados(resultadosCache.data, true);
        } else {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('content').innerHTML = `
                <div class="loading-state">
                    <div class="spinner"></div>
                    Cargando paquetes...
                    <div class="progress-text" id="progress"></div>
                </div>`;
        }

        setStatus('loading');

        const [settled] = await Promise.all([
            Promise.allSettled(CUENTAS.map(c => cargarCuenta(c))),
            cargarHorarios()
        ]);

        const empty = () => ({ flex: 0, flexUni: 0, colecta: 0, colectaUni: 0, total: 0, totalUni: 0 });
        const resultados = settled.map((r, i) => {
            if (r.status === 'fulfilled') return r.value;
            console.error(`Error ${CUENTAS[i].nombre}:`, r.reason);
            return { cuenta: CUENTAS[i], ready: empty(), printed: empty(), pendEsc: empty(), buffered: 0, bufferedUni: 0, flexDatesAll: [], colectaDatesAll: [], error: true };
        });
        const hayError = resultados.some(r => r.error);

        resultadosCache = { data: resultados, fetchedAt: Date.now() };
        renderResultados(resultados, false);
        checkStaleness();

        btn.disabled = false;
        document.getElementById('reloadIcon').style.animation = '';
        actualizarHeaderTime();
        setStatus(hayError ? 'error' : 'live');
    }

    // ══════════════════════════════════════════════
    //  RENDER HELPERS
    // ══════════════════════════════════════════════
    function getHorarioHoy(cuentaNombre) {
        const horarios = HORARIOS[cuentaNombre];
        if (!horarios) return null;
        const h = horarios[new Date().getDay()];
        if (!h || !h.cutoff) return null;
        return h;
    }

    function extraerHorarioPrincipal(action) {
        if (!action) return null;
        const rango = action.match(/(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/);
        if (rango) return `${rango[1]}-${rango[2]}`;
        const hora = action.match(/(\d{1,2}:\d{2})/);
        if (hora) return hora[1];
        return action;
    }

    function extraerHoraTope(action) {
        if (!action) return null;
        const m = action.match(/(\d{1,2}):(\d{2})/);
        if (!m) return null;
        return { h: Number(m[1]), m: Number(m[2]) };
    }

    function renderHorario(horario, readyTotal) {
        if (!horario) return `<div class="card-horario none">💤 Sin hoy</div>`;
        const principal = extraerHorarioPrincipal(horario.action);
        const tope = extraerHoraTope(horario.action);
        const now = new Date();
        let urgent = false, passed = false;
        if (tope) {
            const horaLimite = new Date();
            horaLimite.setHours(tope.h, tope.m, 0, 0);
            const diffMin = (horaLimite - now) / 60000;
            urgent = readyTotal > 0 && diffMin > 0 && diffMin < 120;
            passed = diffMin < 0;
        }
        const icon = passed ? '✅' : (urgent ? '⚠️' : '🚚');
        const cls = urgent ? 'urgent' : (passed ? 'passed' : '');
        return `<div class="card-horario ${cls}" title="Cutoff: ${horario.cutoff}">${icon} <b>${principal}</b></div>`;
    }

    function formatAvg(paq, uni) {
        if (!paq) return null;
        return (uni / paq).toFixed(1);
    }

    // ── Secciones Flex/Colecta ──────────────────────
    function renderTipoGrid(datos, esImpresos = false) {
        const gridClass = esImpresos ? 'tipo-grid impresos-grid' : 'tipo-grid';
        return `
            <div class="${gridClass}">
                <div class="tipo-box flex">
                    <div class="tipo-lbl">🏍️ Flex</div>
                    <div class="tipo-num ${datos.flex === 0 ? 'zero' : ''}">${datos.flex}</div>
                    <div class="tipo-uni ${datos.flexUni === 0 ? 'zero' : ''}">${datos.flexUni} u</div>
                </div>
                <div class="tipo-box colecta">
                    <div class="tipo-lbl">📦 Colecta</div>
                    <div class="tipo-num ${datos.colecta === 0 ? 'zero' : ''}">${datos.colecta}</div>
                    <div class="tipo-uni ${datos.colectaUni === 0 ? 'zero' : ''}">${datos.colectaUni} u</div>
                </div>
            </div>`;
    }

    function renderEscanear(pendEsc, colectaLabel) {
        const total = pendEsc.total || 0;
        const isZero = total === 0;
        return `
            <div class="escanear-block ${isZero ? 'zero' : ''}">
                <div>
                    <div class="escanear-lbl">📡 Por escanear</div>
                </div>
                <div class="escanear-vals">
                    <span><span class="ev-num">${pendEsc.flex}</span> <span class="ev-tipo">flex</span></span>
                    <span><span class="ev-num">${pendEsc.colecta}</span> <span class="ev-tipo">${colectaLabel.toLowerCase()}</span></span>
                </div>
            </div>`;
    }

    function renderResultados(resultados, fromCache = false) {
        const sum = (key, sub) => resultados.reduce((a, r) => a + (r[key]?.[sub] || 0), 0);

        const totReady  = sum('ready', 'total');
        const totReadyU = sum('ready', 'totalUni');
        const totPrint  = sum('printed', 'total');
        const totPrintU = sum('printed', 'totalUni');
        const totEsc    = sum('pendEsc', 'total');
        const totEscFlex = sum('pendEsc', 'flex');
        const totEscCol  = sum('pendEsc', 'colecta');
        const totBuffered = resultados.reduce((a, r) => a + (r.buffered || 0), 0);

        // ── HERO ──
        const heroEl = document.getElementById('hero');
        heroEl.style.display = 'block';
        document.getElementById('heroNumber').textContent = totReady;
        document.getElementById('heroSub').textContent =
            totReady === 1 ? 'paquete para imprimir' : 'paquetes para imprimir';
        document.getElementById('heroUnits').textContent =
            totReady > 0 ? `${totReadyU} unidad${totReadyU !== 1 ? 'es' : ''} total` : '';
        const avgEl = document.getElementById('heroAvg');
        const avg = formatAvg(totReady, totReadyU);
        if (avg) {
            document.getElementById('heroAvgNum').textContent = avg;
            avgEl.style.display = 'block';
        } else {
            avgEl.style.display = 'none';
        }
        document.getElementById('heroCachedBadge').style.display = fromCache ? 'inline-block' : 'none';

        // ── TIEMPO DE TRABAJO ACTUAL ──
        const totalPendienteAhora = totReady + sum('printed', 'total');
        const minAhora = calcTiempoPrep(totalPendienteAhora);
        const tiempoEl = document.getElementById('heroTiempo');
        if (totalPendienteAhora > 0) {
            document.getElementById('heroTiempoVal').textContent = fmtTiempo(minAhora);
            tiempoEl.style.display = 'inline-flex';
        } else {
            tiempoEl.style.display = 'none';
        }

        // ── PROYECCIÓN ──
        renderProyeccion(resultados);

        // ── CARDS POR CUENTA ──
        let html = '';
        resultados.forEach((r, i) => {
            const c = r.cuenta;
            const hasPrints = (r.ready?.total || 0) > 0;
            const horario = getHorarioHoy(c.nombre);
            const allClear = !r.error && (r.ready?.total || 0) === 0 && (r.printed?.total || 0) === 0 && !r.buffered;
            const hasImpresos = (r.printed?.total || 0) > 0;
            const paraImprimirCuenta = (r.ready?.flex || 0) + (r.ready?.colecta || 0);
            const ventasMini = paraImprimirCuenta > 0
                ? `<span class="ventas-mini">· <b>${paraImprimirCuenta}</b> p/imp</span>`
                : '';

            html += `
            <div class="cuenta-card ${c.css} animate-in ${hasPrints ? 'has-prints' : ''}"
                 style="animation-delay:${i * 0.08}s"
                 onclick="toggleCard(this)">
                <div class="card-header-row">
                    <div class="card-name">${c.nombre}${ventasMini}</div>
                    ${renderHorario(horario, r.ready?.total || 0)}
                </div>
                ${r.error
                    ? `<div class="error-badge">⚠️ Error al cargar</div>`
                    : allClear
                        ? `<div class="all-clear-compact">✅ Todo al día</div>`
                        : `
                            <div class="section-label imprimir">🖨️ Para imprimir</div>
                            ${renderTipoGrid(r.ready, false)}
                            <div class="card-impresos">
                                <div class="section-label impresos">📬 Ya impresos</div>
                                ${renderTipoGrid(r.printed, true)}
                            </div>
                            ${hasImpresos ? `<div class="expand-hint">toque para ver ${r.printed.total} ya impresos</div>` : ''}
                        `
                }
                ${r.buffered > 0 ? `<div class="buffered-row">⏳ ${r.buffered} buffered · ${r.bufferedUni || 0}u</div>` : ''}
            </div>`;
        });

        // ── TOTAL ──
        const totalReady   = {
            flex: sum('ready', 'flex'), flexUni: sum('ready', 'flexUni'),
            colecta: sum('ready', 'colecta'), colectaUni: sum('ready', 'colectaUni'),
            total: totReady, totalUni: totReadyU
        };
        const totalPrinted = {
            flex: sum('printed', 'flex'), flexUni: sum('printed', 'flexUni'),
            colecta: sum('printed', 'colecta'), colectaUni: sum('printed', 'colectaUni'),
            total: totPrint, totalUni: totPrintU
        };
        const totalPendEsc = {
            flex: totEscFlex, colecta: totEscCol, total: totEsc
        };
        const totalAllClear = totReady === 0 && totPrint === 0 && totEsc === 0 && !totBuffered;
        const avgTot = formatAvg(totReady, totReadyU);
        const totalVentasParaImprimirGlobal = totReady;

        const hasImpresosTotal = totPrint > 0;
        const hasEscanearTotal = totEsc > 0;
        const totalExpandible = hasImpresosTotal || hasEscanearTotal;

        html += `
        <div class="cuenta-card total animate-in${totalExpandible ? ' total-expandible' : ''}" style="animation-delay:${resultados.length * 0.08}s"
             ${totalExpandible ? 'onclick="toggleCard(this)"' : ''}>
            <div class="card-header-row">
                <div class="card-name">Total${totalVentasParaImprimirGlobal ? `<span class="ventas-mini">· <b>${totalVentasParaImprimirGlobal}</b> p/imp</span>` : ''}</div>
                <div class="card-horario" style="font-size:11px">
                    ${avgTot ? `<span style="color:var(--muted-2)">⌀ ${avgTot} u/paq</span>` : `<span style="color:var(--muted)">—</span>`}
                </div>
            </div>
            ${totalAllClear
                ? `<div class="all-clear-compact">✅ Todo al día</div>`
                : `
                    <div class="section-label imprimir">🖨️ Para imprimir</div>
                    ${renderTipoGrid(totalReady, false)}
                    <div class="card-impresos">
                        ${hasImpresosTotal ? `
                            <div class="section-label impresos">📬 Ya impresos</div>
                            ${renderTipoGrid(totalPrinted, true)}
                        ` : ''}
                        ${renderEscanear(totalPendEsc, 'colecta')}
                    </div>
                    ${totalExpandible ? `<div class="expand-hint">toque para ver ${hasImpresosTotal ? totPrint + ' impresos' : ''}${hasImpresosTotal && hasEscanearTotal ? ' · ' : ''}${hasEscanearTotal ? totEsc + ' por escanear' : ''}</div>` : ''}
                `
            }
            ${totBuffered > 0 ? `<div class="buffered-row">⏳ ${totBuffered} buffered</div>` : ''}
        </div>`;

        document.getElementById('content').innerHTML = html;
    }

    // ══════════════════════════════════════════════
    //  TOGGLE EXPAND
    // ══════════════════════════════════════════════
    window.toggleCard = function(card) {
        if (card.classList.contains('total') && !card.classList.contains('total-expandible')) return;
        if (card.querySelector('.all-clear-compact')) return;
        card.classList.toggle('expanded');
    };

    // ══════════════════════════════════════════════
    //  UI UTILS
    // ══════════════════════════════════════════════
    function setProgress(txt) {
        const el = document.getElementById('progress');
        if (el) el.textContent = txt;
    }

    function actualizarHeaderTime() {
        const ahora = new Date();
        document.getElementById('headerTime').textContent =
            ahora.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    }

    function setStatus(state) {
        const row = document.getElementById('statusRow');
        const dot = document.getElementById('statusDot');
        const txt = document.getElementById('statusText');
        row.style.display = 'flex';

        if (state === 'loading') {
            dot.className = 'dot-status';
            txt.textContent = 'actualizando...';
        } else if (state === 'live') {
            dot.className = 'dot-status live';
            const d = resultadosCache ? new Date(resultadosCache.fetchedAt) : new Date();
            txt.textContent = `actualizado ${d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })}`;
        } else if (state === 'error') {
            dot.className = 'dot-status error';
            txt.textContent = 'error en alguna cuenta';
        } else if (state === 'cached') {
            dot.className = 'dot-status cached';
            txt.textContent = 'datos en caché';
        }
    }

    // ══════════════════════════════════════════════
    //  AUTO-REFRESH & GESTOS
    // ══════════════════════════════════════════════
    setInterval(() => {
        if (!document.getElementById('reloadBtn').disabled) cargarTodo(false);
    }, 5 * 60 * 1000);

    let touchStartY = 0;
    document.addEventListener('touchstart', e => {
        if (window.scrollY === 0) touchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', e => {
        const diff = e.changedTouches[0].clientY - touchStartY;
        if (diff > 100 && window.scrollY === 0 && !document.getElementById('reloadBtn').disabled) {
            cargarTodo(false);
        }
    }, { passive: true });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // ── INICIO ──
    cargarTodo(false);
    </script>
</body>
</html>
